<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigatiion</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            
        }
        body{
            background-color: rgb(0, 0, 0, 0.5);
            
        }
        html{
            scroll-behavior:smooth;
        }
        #navbar{
            border-radius: 50px;
            height: 50px;
            width: 80%;
            margin: auto;
            margin-top: 10px;
            margin-bottom: 10px;
            background: aqua;
            border: 1px solid black;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            z-index: 100;
            position: relative;
            overflow: hidden;
            position: sticky;
            top: 10px;
        }
        nav::before{
            content: '';
            position: absolute;
            width: 100%;
            height: 300%;
            background-image: linear-gradient(180deg, rgb(0, 183,255), rgb(255,48,255));
            animation:spin 3s linear infinite;
        }

        nav::after{
            content: '';
            background: aqua;

            position: absolute;
            inset: 4px;
            border-radius: 50px;
            z-index: 1;
        }
        
        @keyframes spin{
            from{
                transform:rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
        
        a{
            text-decoration: none;
            color: black;
            position: relative;
            z-index: 2;
        }
        .panel{
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #about{
            background-color: orangered;
        }
        #qualification{
            background-color: aqua;
        }
        #skills{
            background-color: grey;
        }
        #projects{
            background-color: greenyellow;
        }
        #contact{
            background-color: blueviolet;
            height: 30vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top:5px;
            
        }
    </style>
</head>
<body>
        <nav id="navbar">
                <a href="#about">About</a>
                <a href="#qualification">Qualifications</a>
                <a href="#skills">Skills</a>
                <a href="#projects">Projects</a>
                <a href="#contact">Contact Me</a>
        </nav>
    

    <!-- About -->
     <section id="about" class="panel">
        <h2>About</h2>
     </section>

     <!-- Qualification -->
     <section id="qualification" class="panel">
        <h2>Qualification</h2>
     </section>

     <!-- Skills -->
     <section id="skills" class="panel">
        <h2>Skills</h2>
     </section>

     <!-- Projects -->
     <section id="projects" class="panel">
        <h2>Projects</h2>
     </section>

     <!-- Contact -->
     <section id="contact" >
        <h2>ContactMe</h2>
     </section>

    
</body>
</html>
